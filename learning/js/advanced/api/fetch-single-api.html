<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <style>
    /* Global Styles */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family:
        -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Oxygen, Ubuntu,
        sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    /* Container */
    .container {
      max-width: 900px;
      width: 100%;
      margin: 0 auto;
    }

    /* Products container - Single product view */
    .products {
      display: flex;
      justify-content: center;
      align-items: center;
    }

    /* Single Product Card */
    .products a {
      display: flex;
      flex-direction: column;
      text-decoration: none;
      background: white;
      border-radius: 30px;
      overflow: hidden;
      box-shadow: 0 30px 50px rgba(0, 0, 0, 0.3);
      max-width: 500px;
      width: 100%;
      transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      position: relative;
      animation: slideUp 0.6s ease-out;
    }

    @keyframes slideUp {
      from {
        opacity: 0;
        transform: translateY(40px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .products a:hover {
      transform: translateY(-10px) scale(1.02);
      box-shadow: 0 40px 60px rgba(102, 126, 234, 0.4);
    }

    /* Image Container */
    .image {
      width: 100%;
      height: 400px;
      object-fit: contain;
      background: linear-gradient(135deg, #f5f7fa 0%, #e4e8f0 100%);
      padding: 40px;
      transition: all 0.5s ease;
      mix-blend-mode: multiply;
    }

    .products a:hover .image {
      transform: scale(1.08) rotate(2deg);
      background: linear-gradient(135deg, #eef2f7 0%, #d9e0eb 100%);
    }

    /* Title */
    .title {
      font-size: 24px;
      font-weight: 700;
      color: #2d3748;
      line-height: 1.4;
      margin: 25px 25px 12px;
      font-family:
        -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      letter-spacing: -0.3px;
      position: relative;
      padding-bottom: 12px;
    }

    .title::after {
      content: "";
      position: absolute;
      bottom: 0;
      left: 0;
      width: 60px;
      height: 4px;
      background: linear-gradient(90deg, #667eea, #764ba2);
      border-radius: 2px;
    }

    /* Price */
    .price {
      font-size: 36px;
      font-weight: 800;
      color: #667eea;
      margin: 0 25px 15px;
      font-family:
        -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      display: flex;
      align-items: center;
    }

    .price::before {
      content: "$";
      font-size: 22px;
      font-weight: 500;
      margin-right: 4px;
      color: #a0aec0;
      align-self: flex-start;
      margin-top: 6px;
    }

    .price::after {
      content: "USD";
      font-size: 14px;
      font-weight: 500;
      color: #a0aec0;
      margin-left: 8px;
      align-self: flex-end;
      margin-bottom: 8px;
    }

    /* Description */
    .description {
      font-size: 16px;
      color: #4a5568;
      line-height: 1.7;
      margin: 0 25px 20px;
      font-family:
        -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      padding: 15px;
      background: #f7fafc;
      border-radius: 16px;
      border-left: 4px solid #667eea;
      letter-spacing: 0.2px;
    }

    /* Category */
    .category {
      font-size: 14px;
      font-weight: 600;
      color: #667eea;
      background: linear-gradient(135deg, #f6f9fc 0%, #e6f0fa 100%);
      padding: 8px 20px;
      border-radius: 50px;
      margin: 0 25px 15px;
      display: inline-block;
      width: fit-content;
      text-transform: uppercase;
      letter-spacing: 1px;
      border: 1px solid #d4e2f0;
      box-shadow: 0 2px 6px rgba(102, 126, 234, 0.1);
    }

    /* Rating */
    .products a p {
      margin: 0 25px 30px;
      font-size: 16px;
      color: #4a5568;
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
      padding: 15px 20px;
      background: #fff5f5;
      border-radius: 50px;
      width: fit-content;
      border: 1px solid #fed7d7;
    }

    .products a p strong {
      color: #e53e3e;
      font-weight: 700;
      font-size: 18px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .products a p strong:first-of-type {
      background: #e53e3e;
      color: white;
      padding: 6px 15px;
      border-radius: 30px;
      font-size: 16px;
    }

    .products a p strong:first-of-type::before {
      content: "⭐";
      font-size: 16px;
      margin-right: 6px;
    }

    .products a p strong:last-of-type {
      color: #718096;
      font-weight: 500;
      font-size: 15px;
    }

    /* Not found message */
    .products p:only-child {
      text-align: center;
      padding: 50px;
      background: white;
      border-radius: 30px;
      font-size: 20px;
      color: #e53e3e;
      font-weight: 600;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
      animation: fadeIn 0.5s ease-out;
      border: 2px dashed #fc8181;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
      }
      to {
        opacity: 1;
      }
    }

    /* Loading animation while fetching */
    .products:empty {
      width: 80px;
      height: 80px;
      margin: 50px auto;
      border: 4px solid #f3f3f3;
      border-top: 4px solid #667eea;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      0% {
        transform: rotate(0deg);
      }
      100% {
        transform: rotate(360deg);
      }
    }

    /* Back button (you can add this in HTML if needed) */
    .back-button {
      display: inline-block;
      margin-bottom: 20px;
      color: white;
      text-decoration: none;
      font-size: 16px;
      font-weight: 500;
      padding: 10px 20px;
      background: rgba(255, 255, 255, 0.2);
      border-radius: 30px;
      transition: all 0.3s ease;
    }

    .back-button:hover {
      background: rgba(255, 255, 255, 0.3);
      transform: translateX(-5px);
    }

    /* Responsive Design */
    @media (max-width: 768px) {
      body {
        padding: 15px;
        align-items: flex-start;
      }

      .products a {
        max-width: 100%;
      }

      .image {
        height: 300px;
        padding: 30px;
      }

      .title {
        font-size: 22px;
        margin: 20px 20px 10px;
      }

      .price {
        font-size: 30px;
        margin: 0 20px 12px;
      }

      .description {
        font-size: 15px;
        margin: 0 20px 15px;
        padding: 12px;
      }

      .products a p {
        margin: 0 20px 25px;
        padding: 12px 18px;
      }
    }

    @media (max-width: 480px) {
      .image {
        height: 250px;
        padding: 20px;
      }

      .title {
        font-size: 20px;
        margin: 15px 15px 8px;
      }

      .title::after {
        width: 40px;
      }

      .price {
        font-size: 28px;
        margin: 0 15px 10px;
      }

      .description {
        font-size: 14px;
        margin: 0 15px 12px;
        padding: 10px;
      }

      .category {
        margin: 0 15px 12px;
        font-size: 12px;
      }

      .products a p {
        margin: 0 15px 20px;
        font-size: 14px;
        padding: 10px 15px;
      }

      .products a p strong:first-of-type {
        font-size: 14px;
        padding: 4px 12px;
      }
    }

    /* Print styles */
    @media print {
      body {
        background: white;
        padding: 0;
      }

      .products a {
        box-shadow: none;
        border: 1px solid #ddd;
        animation: none;
      }

      .products a:hover {
        transform: none;
        box-shadow: none;
      }
    }

    /* Dark mode preference */
    @media (prefers-color-scheme: dark) {
      body {
        background: linear-gradient(135deg, #1a202c 0%, #2d3748 100%);
      }

      .products a {
        background: #2d3748;
      }

      .title {
        color: #f7fafc;
      }

      .description {
        background: #1a202c;
        color: #cbd5e0;
        border-left-color: #667eea;
      }

      .price {
        color: #90cdf4;
      }

      .category {
        background: #1a202c;
        border-color: #4a5568;
        color: #90cdf4;
      }
    }
  </style>
  <body>
    <!-- list products -->
    <div class="container">
      <div class="products"></div>
    </div>

    <script>
      const show = document.querySelector(".products");

      // get id form main for show data
      function getProductFromUrl() {
        const urlParams = new URLSearchParams(window.location.search);
        const id = urlParams.get("id");
        return id ? parseInt(id) : null;
      }
      async function getProducts(id) {
        try {
          // get responce data when click for main page
          const responce = await fetch(
            `https://fakestoreapi.com/products/${id}`,
          );
          // change to json
          const listProducts = await responce.json();
          displayProducts(listProducts);
        } catch (error) {
          console.log(error);
        }
      }

      function displayProducts(p) {
        if (p.length === 0) {
          return (show.innerHTML = "<p> Product is not found!! </p>");
        }

        const htmlContent = `
            <a href="fetch-single-api.html?id=${p.id}">
                <img src="${p.image}" alt="${p.title}" class="image" />
                <div class="title">${p.title}</div>
                <div class="price">${p.price}</div>
                <div class="description">${p.description}</div>
                <div class="category">${p.category}</div>
                <p><strong>Rating:</strong> ${p.rating.rate} (${p.rating.count} reviews)</p>

            </a>
            `;

        show.innerHTML = htmlContent;
      }

      // return result
      const singleProducts = getProductFromUrl();

      if (singleProducts) {
        getProducts(singleProducts);
      } else {
        console.log("not product");
      }
    </script>
  </body>
</html>
